controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - left_finger_joint
      - right_finger_joint

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

gripper_controller:
  ros__parameters:
    joints:
      - left_finger_joint
      - right_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

gz_ros_control:
  ros__parameters:
    pid_gains:
      position:
        joint1: {kp: 200.0, ki: 0.0, kd: 20.0}
        joint2: {kp: 500.0, ki: 0.0, kd: 50.0}
        joint3: {kp: 300.0, ki: 0.0, kd: 30.0}
        joint4: {kp: 100.0, ki: 0.0, kd: 10.0}
        joint5: {kp: 100.0, ki: 0.0, kd: 10.0}
        joint6: {kp: 100.0, ki: 0.0, kd: 10.0}

gazebo_ros2_control:
  ros__parameters:
    pid_gains:
      position:
        joint1: {kp: 200.0, ki: 0.0, kd: 20.0}
        joint2: {kp: 500.0, ki: 0.0, kd: 50.0}
        joint3: {kp: 300.0, ki: 0.0, kd: 30.0}
        joint4: {kp: 100.0, ki: 0.0, kd: 10.0}
        joint5: {kp: 100.0, ki: 0.0, kd: 10.0}
        joint6: {kp: 100.0, ki: 0.0, kd: 10.0}
